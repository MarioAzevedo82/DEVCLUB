<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="card">
        <h2>Calculora de IMC</h2>
        <div class="campo">
            <label>Digite sua altura (m)</label>
            <input type="number" id="altura" placeholder="Ex: 1.75" step="0.01">
        </div>
        <div class="campo">
            <label>Digite seu peso (Kg)</label>
            <input type="number" id="peso" placeholder="Ex: 90" step="0.1">
        </div>
        <button onclick="calcular()">Calcular</button>

        <p id="resultado"></p>
    </main>

    <script src="script.js"></script>
</body>
</html>
